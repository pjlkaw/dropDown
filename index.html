<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropDown</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">

    <style>
        #submenu  {
            display: none;
            flex-direction: column;
            z-index: 1;
            position: absolute;
        }
        img {
            filter: grayscale();
        }
    </style>

</head>
<body>
    <header>
        <nav class="d-flex w-100 bg-dark text-light text-decoration-none list-unstyled gap-5 p-2 justify-content-center">
    
    
            <li class="w-50"><a href="#" class="text-light text-decoration-none fw-bold">Início</a></li>
    
            <li class="w-50" id="menu">
                <a href="#" class="text-light text-decoration-none fw-bold" id="cursos">Cursos</a>
    
                <ul id="submenu" class="list-unstyled bg-dark p-3">
                    <li><a onclick="alert('HTML')" href="#" class="text-light text-decoration-none ">HTML</a></li>
                    <li><a onclick="alert('CSS')" href="#" class="text-light text-decoration-none ">CSS</a></li>
                    <li><a onclick="alert('Javascript')" href="#" class="text-light text-decoration-none ">Javascript</a></li>
                </ul>
            </li>
    
        </nav>
    </header>

    <main class="d-flex">
        <img class="w-50" src="Captura de tela de 2026-05-23 16-11-18.png" alt="">
        <img class="w-50" src="Captura de tela de 2026-05-23 16-11-18.png" alt="">
    </main>

    <script>
        document.getElementById('menu').addEventListener('mouseover', () => {
            document.getElementById('submenu').style.opacity='1'
            document.getElementById('submenu').style.display='flex'
        })

        document.getElementById('menu').addEventListener('mouseout', () => {
            document.getElementById('submenu').style.opacity='0'
            document.getElementById('submenu').style.display='none'
        })
    </script>
</body>
</html>
